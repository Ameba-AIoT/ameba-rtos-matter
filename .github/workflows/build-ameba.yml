name: Build Ameba RTOS Matter Docker Image

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Clean up Docker
      run: |
        docker system prune -af

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker buildx build --file tools/docker/Dockerfile --tag ameba-rtos-matter:latest --load .

    - name: Check Docker images
      run: docker images

    - name: Run Docker container and execute scripts
      run: |
        docker run --name ameba_container -d ameba-rtos-matter:latest /bin/bash
        sleep 10
        docker exec ameba_container /bin/bash -c "cd ambz2_matter/component/common/application/matter/tools/docker && ./env_setup.sh"
        docker stop ameba_container
        docker rm ameba_container

